name: Green Across the Board Alert

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 5:30 PM UAE time (UTC+4), Mon–Fri — at US market open
  workflow_dispatch:          # manual trigger

jobs:
  green-alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run green alert
        run: python green_alert.py
