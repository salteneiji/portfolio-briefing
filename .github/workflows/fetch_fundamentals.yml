name: Fetch Fundamentals

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 5:00 PM UAE time (UTC+4), Mon–Fri — 30 min before US market open
  workflow_dispatch:           # manual trigger

jobs:
  fetch-fundamentals:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # needed to commit fundamentals.json

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch fundamentals
        run: python fetch_fundamentals.py

      - name: Commit fundamentals.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundamentals.json
          git diff --staged --quiet || git commit -m "chore: update fundamentals data [skip ci]"
          git push
